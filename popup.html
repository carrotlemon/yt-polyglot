<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Polyglot</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>YT Polyglot</h1>
    <p class="subtitle">Multi-language subtitles for YouTube</p>
  </header>

  <div id="controls" class="hidden">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"/>
        <path d="M21 21l-4.3-4.3"/>
      </svg>
      <input id="search" type="text" placeholder="Search languages…" autocomplete="off" />
    </div>
    <button id="filter-translated" class="filter-btn" title="Hide auto-translated tracks">
      Original only
    </button>
  </div>

  <div id="settings" class="hidden">
    <label class="setting-toggle">
      <input type="checkbox" id="show-labels" />
      <span>Show language labels on subtitles</span>
    </label>
  </div>

  <main id="main">
    <div id="loading" class="state-msg">Loading tracks…</div>
    <div id="no-tracks" class="state-msg hidden">
      No subtitle tracks found.<br />Open a YouTube video first.
    </div>
    <div id="no-matches" class="state-msg hidden">No matches.</div>
    <div id="track-list" class="hidden"></div>
  </main>

  <footer>
    <span id="active-count">0 active</span>
    <button id="clear-btn">Clear all</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
